<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sipariş Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d;--card:#1a1a1a;--border:#2a2a2a;
  --accent:#e8c840;--red:#e84040;--green:#40c870;
  --blue:#4090e8;--text:#f0f0f0;--muted:#666;
  --profit:#40c870;--orange:#e88040;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px 16px 120px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:2px;color:var(--accent);margin-bottom:4px;}
.sub{color:var(--muted);font-size:0.85rem;margin-bottom:20px;}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.tab{flex-shrink:0;padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;position:relative;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#000;}
.tab.delivered{border-color:var(--green);color:var(--green);opacity:0.65;}
.tab.delivered.active{background:var(--green);border-color:var(--green);color:#000;opacity:1;}
.tab .bdg{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.6rem;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.btn-nc{flex-shrink:0;padding:8px 12px;border-radius:20px;border:1px dashed var(--blue);background:transparent;color:var(--blue);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;}

/* VIEWS */
.view{display:none;}.view.active{display:block;}

/* CUSTOMER HEADER */
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.chl{display:flex;align-items:center;gap:8px;}
.cname{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;}
.mcbtns{display:flex;gap:4px;}
.mcbtn{padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;}
.mcbtn:disabled{opacity:0.2;cursor:default;}
.btn-dc{padding:6px 12px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:0.78rem;font-weight:600;cursor:pointer;}

/* DELIVERY */
.dbar{margin-bottom:16px;}
.btn-del{width:100%;padding:12px;border-radius:12px;border:2px solid var(--green);background:transparent;color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.btn-del.done{background:var(--green);color:#000;}

/* PRODUCTS */
.prods{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.prow{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:6px;transition:border-color 0.2s;}
.prow.active{border-color:var(--accent);}
.prow.dimmed{opacity:0.5;pointer-events:none;}
.mbtns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.mbtn{width:26px;height:22px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mbtn:active{background:var(--border);}
.mbtn:disabled{opacity:0.2;cursor:default;}
.pinfo{flex:1;min-width:0;}
.pnrow{display:flex;align-items:baseline;gap:5px;overflow:hidden;}
.pname{font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.psize{font-size:0.7rem;color:var(--blue);background:#0a1a2a;border:1px solid #1a3a5a;padding:1px 5px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.pmeta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.ptag{font-size:0.7rem;padding:1px 5px;border-radius:5px;}
.psell{background:#1a1a00;color:var(--accent);border:1px solid #3a3a00;}
.pbuy{background:#001a00;color:var(--green);border:1px solid #003a00;}
.pprofit{background:#001a10;color:var(--profit);border:1px solid #003a20;font-weight:700;}
.ptag.custom{border-color:var(--accent);}
.ctr{display:flex;align-items:center;gap:8px;}
.cbtn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.cbtn:active{transform:scale(0.88);}
.cbtn.plus{border-color:var(--accent);color:var(--accent);}
.cbtn.minus{border-color:var(--red);color:var(--red);}
.cval{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;min-width:20px;text-align:center;color:var(--accent);}
.ebtn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--blue);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dbtn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:20px;}
.mov.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.mt{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;color:var(--accent);margin-bottom:4px;}
.ms{font-size:0.8rem;color:var(--muted);margin-bottom:16px;}
.modal label{font-size:0.8rem;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px;}
.modal input{width:100%;background:#111;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;}
.modal input:focus{border-color:var(--accent);}
.pprev{margin-top:10px;padding:10px 12px;background:#001a10;border:1px solid #003a20;border-radius:8px;font-size:0.85rem;}
.rpbtn{margin-top:10px;width:100%;padding:8px;background:transparent;border:1px dashed var(--muted);border-radius:8px;color:var(--muted);font-size:0.8rem;cursor:pointer;}
.mbtns2{display:flex;gap:8px;margin-top:16px;}
.bsave{flex:1;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;}
.bcancel{flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;cursor:pointer;}

/* ADD PANEL */
.apanel{background:var(--card);border:1px dashed var(--green);border-radius:14px;padding:16px;margin-bottom:24px;}
.aptitle{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--green);letter-spacing:1px;margin-bottom:12px;}
.afields{display:flex;gap:6px;flex-wrap:wrap;}
.afields input{flex:1;min-width:70px;background:#111;border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;}
.afields input::placeholder{color:var(--muted);font-size:0.78rem;}
.afields input:focus{border-color:var(--green);}
.aadd{padding:9px 14px;background:var(--green);border:none;border-radius:8px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px;cursor:pointer;}
.errmsg{color:var(--red);font-size:0.8rem;margin-top:8px;min-height:16px;}

/* SUMMARY */
.summ{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.summt{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.sitem{display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border);}
.sitem:last-of-type{border-bottom:none;}
.sitem span:last-child{color:var(--accent);font-weight:600;}
.trow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.tlbl{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;}
.tamt{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--accent);}
.prow2{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:2px solid var(--profit);}
.plbl{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--profit);}
.pamt{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--profit);}
.breset{width:100%;padding:13px;background:transparent;border:2px solid var(--red);color:var(--red);border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;cursor:pointer;margin-bottom:8px;}
.breset:active{background:var(--red);color:#fff;}

/* TOPLAM */
.gbox{background:#1a1500;border:2px solid var(--accent);border-radius:14px;padding:18px 16px;margin-bottom:16px;}
.gbt{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);letter-spacing:1px;margin-bottom:12px;}
.gsec{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:1px;margin:14px 0 8px;padding-top:14px;border-top:1px solid #2a2500;}
.gsec.w{color:var(--orange);}
.gsec.d{color:var(--green);}
.gci{display:flex;justify-content:space-between;font-size:0.88rem;padding:6px 0;border-bottom:1px solid #2a2500;}
.gci:last-of-type{border-bottom:none;}
.gp{color:var(--profit);font-size:0.78rem;}
.slbl{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--blue);letter-spacing:1px;margin:16px 0 8px;}
.pti{display:flex;justify-content:space-between;align-items:center;font-size:0.88rem;padding:6px 0;border-bottom:1px solid #2a2500;}
.pti:last-of-type{border-bottom:none;}
.ptil{display:flex;flex-direction:column;}
.ptin{font-weight:600;}
.ptis{font-size:0.75rem;color:var(--muted);margin-top:1px;}
.ptir{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.abadge{background:var(--blue);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;padding:2px 8px;border-radius:10px;}
.ttext{color:var(--accent);font-weight:600;font-size:0.85rem;}
.prtext{color:var(--profit);font-size:0.78rem;}
.gtrow{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:2px solid var(--accent);}
.gtbox{flex:1;display:flex;flex-direction:column;align-items:center;}
.gtlbl{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:1px;color:var(--muted);}
.gtamt{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;}
.gtamt.s{color:var(--accent);}
.gtamt.p{color:var(--profit);}

/* FİYAT LİSTESİ */
.plcard{background:var(--card);border:2px solid var(--accent);border-radius:16px;padding:20px;margin-bottom:14px;}
.plh{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:4px;}
.plsub{text-align:center;color:var(--muted);font-size:0.8rem;margin-bottom:20px;}
.plitem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.plitem:last-of-type{border-bottom:none;}
.pll{display:flex;flex-direction:column;}
.plname{font-size:1rem;font-weight:600;}
.plsize{font-size:0.75rem;color:var(--blue);margin-top:2px;}
.plprice{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);}
.bcopy{width:100%;padding:14px;background:var(--blue);border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;cursor:pointer;margin-bottom:8px;}
.bcopy:active{opacity:0.8;}
.csuccess{text-align:center;color:var(--green);font-size:0.9rem;padding:8px;display:none;}

/* EKSİKLER */
.esec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.etitle{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;margin-bottom:12px;}
.etitle.al{color:var(--orange);}
.etitle.nt{color:var(--blue);}
.einrow{display:flex;gap:8px;margin-bottom:10px;}
.einput{flex:1;background:#111;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;}
.einput:focus{border-color:var(--orange);}
.ninput:focus{border-color:var(--blue);}
.eabtn{padding:10px 14px;border:none;border-radius:8px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;cursor:pointer;}
.eabtn.al{background:var(--orange);}
.eabtn.nt{background:var(--blue);color:#fff;}
.eitem{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.eitem:last-of-type{border-bottom:none;}
.nitem{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.nitem:last-of-type{border-bottom:none;}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:6px;flex-shrink:0;}
.ntxt{flex:1;font-size:0.9rem;}
.idel{width:22px;height:22px;border:none;background:transparent;color:var(--muted);font-size:0.85rem;cursor:pointer;flex-shrink:0;}
.idel:hover{color:var(--red);}
.empty{color:var(--muted);font-size:0.85rem;text-align:center;padding:10px 0;}

/* SAVE */
.sind{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.sind.show{opacity:1;}
</style>
</head>
<body>

<h1>SİPARİŞ TAKİP</h1>
<p class="sub">Sipariş · Kâr · Fiyat Listesi · Eksikler</p>

<div class="tabs" id="tabBar">
  <button class="btn-nc" onclick="addCustomer()">+ Müşteri</button>
  <button class="tab" id="tTotal" onclick="showTab('total')">📊 TOPLAM</button>
  <button class="tab" id="tPrice" onclick="showTab('price')">🏷 FİYATLAR</button>
  <button class="tab" id="tEksik" onclick="showTab('eksik')">📝 EKSİKLER</button>
</div>

<div id="custCont"></div>

<!-- TOPLAM -->
<div class="view" id="vTotal">
  <div class="gbox">
    <div class="gbt">ÖZET</div>
    <div id="gwSec" style="display:none"><div class="gsec w">⏳ BEKLEYENLEr</div><div id="gwItems"></div></div>
    <div id="gdSec" style="display:none"><div class="gsec d">✅ TESLİM EDİLENLER</div><div id="gdItems"></div></div>
    <div class="slbl" id="prodSlbl" style="display:none">ÜRÜN BAZLI ADET TOPLAMI</div>
    <div id="prodItems"></div>
    <div class="gtrow">
      <div class="gtbox"><span class="gtlbl">CİRO</span><span class="gtamt s" id="gTotal">0 €</span></div>
      <div class="gtbox"><span class="gtlbl">KÂR</span><span class="gtamt p" id="gProfit">0 €</span></div>
    </div>
  </div>
  <button class="breset" onclick="resetAll()">🗑 HEPSİNİ SIFIRLA</button>
</div>

<!-- FİYAT LİSTESİ -->
<div class="view" id="vPrice">
  <div class="plcard">
    <div class="plh">🥤 FİYAT LİSTESİ</div>
    <div class="plsub">Güncel fiyatlarımız</div>
    <div id="plItems"></div>
  </div>
  <button class="bcopy" onclick="copyPrice()">📋 WHATSAPP'A KOPYALA</button>
  <div class="csuccess" id="cSuccess">✓ Kopyalandı! WhatsApp'a yapıştır.</div>
</div>

<!-- EKSİKLER -->
<div class="view" id="vEksik">
  <div class="esec">
    <div class="etitle al">🛒 ALINACAKLAR</div>
    <div id="alProductList"></div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px;">Seçilenler:</div>
      <div id="alSummary"><p class="empty">Henüz seçilmedi.</p></div>
    </div>
    <button onclick="clearAl()" style="width:100%;margin-top:10px;padding:9px;background:transparent;border:1px dashed var(--red);color:var(--red);border-radius:8px;font-size:0.85rem;cursor:pointer;">Sıfırla</button>
  </div>
  <div class="esec">
    <div class="etitle nt">📌 NOTLAR</div>
    <div class="einrow">
      <input type="text" class="einput ninput" id="notInp" placeholder="Not ekle..." />
      <button class="eabtn nt" onclick="addNot()">EKLE</button>
    </div>
    <div id="notList"><p class="empty">Not yok.</p></div>
  </div>
</div>

<!-- MODAL -->
<div class="mov" id="editMov">
  <div class="modal">
    <div class="mt" id="eTitle">ÜRÜN DÜZENLE</div>
    <div class="ms" id="eSub"></div>
    <label>Satış Fiyatı (€)</label>
    <input type="number" id="ePrice" placeholder="Satış fiyatı" min="0" oninput="updPrev()" />
    <label>Alış Fiyatı (€) <span style="color:var(--muted);font-weight:400">— opsiyonel</span></label>
    <input type="number" id="eBuy" placeholder="Alış fiyatı" min="0" oninput="updPrev()" />
    <div class="pprev" id="ePrev" style="display:none"></div>
    <button class="rpbtn" id="eReset" onclick="resetDef()" style="display:none">↺ Varsayılan fiyata dön</button>
    <div class="mbtns2">
      <button class="bcancel" onclick="closeEdit()">İPTAL</button>
      <button class="bsave" onclick="saveEdit()">KAYDET</button>
    </div>
  </div>
</div>

<div class="sind" id="sind">✓ KAYDEDİLDİ</div>

<script>
const DEF = [
  {name:"Coca Cola",size:"0.33",price:14,buyPrice:0},
  {name:"Cola Zero",size:"0.33",price:14,buyPrice:0},
  {name:"Cola Vanilla",size:"0.33",price:14,buyPrice:0},
  {name:"Cola Cherry",size:"0.33",price:14,buyPrice:0},
  {name:"Fanta Exotic",size:"0.33",price:14,buyPrice:0},
  {name:"Fanta Orange",size:"0.33",price:14,buyPrice:0},
  {name:"Fanta Orange Zero",size:"0.33",price:14,buyPrice:0},
  {name:"Fanta Lemon",size:"0.33",price:14,buyPrice:0},
  {name:"Fuzetea Pfirsich",size:"0.33",price:14,buyPrice:0},
  {name:"Sprite",size:"0.33",price:14,buyPrice:0},
  {name:"Pepsi Cola",size:"0.33",price:14,buyPrice:0},
  {name:"Pepsi Max Zero",size:"0.33",price:14,buyPrice:0},
  {name:"Mirinda Orange",size:"0.33",price:14,buyPrice:0},
  {name:"Mirinda Zero",size:"0.33",price:14,buyPrice:0},
  {name:"Redbull",size:"0.25",price:25,buyPrice:0},
  {name:"28 Black",size:"0.25",price:25,buyPrice:0},
  {name:"X Energy",size:"0.25",price:14,buyPrice:0},
  {name:"Kizilày Sade Soda",size:"",price:14,buyPrice:0},
  {name:"Kizilày Limon",size:"",price:14,buyPrice:0},
  {name:"Ayran",size:"",price:14,buyPrice:0},
  {name:"Durstlöscher Eistea",size:"",price:14,buyPrice:0},
  {name:"Durstlöscher Zitrone",size:"",price:14,buyPrice:0},
  {name:"Durstlöscher Multi",size:"",price:14,buyPrice:0},
  {name:"Durstlöscher Orange",size:"",price:14,buyPrice:0},
  {name:"Capri Sonne Multi",size:"",price:14,buyPrice:0},
  {name:"Capri Sonne Orange",size:"",price:14,buyPrice:0},
  {name:"Capri Sonne Kirsche",size:"",price:14,buyPrice:0},
  {name:"Capri Sonne Safari",size:"",price:14,buyPrice:0},
  {name:"Erikli",size:"0.5",price:4,buyPrice:0},
  {name:"Erikli",size:"1.5",price:4.5,buyPrice:0},
];

let products=[], customers=[], alArr=[], notlar=[], activeTab='total';
let eCi=null, ePi=null;

function load() {
  try {
    const s = localStorage.getItem('sd3');
    if (s) {
      const d = JSON.parse(s);
      products = d.products || JSON.parse(JSON.stringify(DEF));
      customers = d.customers || [];
      alArr = d.alArr || new Array(products.length).fill(0);
      notlar = d.notlar || [];
      if (alArr.length < products.length) {
        while (alArr.length < products.length) alArr.push(0);
      }
      products.forEach(p => { if (!p.size) p.size = ''; });
    } else {
      products = JSON.parse(JSON.stringify(DEF));
      customers = []; alArr = new Array(products.length).fill(0); notlar = [];
    }
  } catch(e) {
    products = JSON.parse(JSON.stringify(DEF));
    customers = []; alArr = new Array(products.length).fill(0); notlar = [];
  }
}

let st=null;
function save() {
  try {
    localStorage.setItem('sd3', JSON.stringify({products,customers,alArr,notlar}));
    const el = document.getElementById('sind');
    el.classList.add('show');
    clearTimeout(st);
    st = setTimeout(()=>el.classList.remove('show'), 1500);
  } catch(e) {}
}

load();

function pdn(p) { return p.name + (p.size ? ' ' + p.size : ''); }
function sp(ci,pi) { return (customers[ci].prices && customers[ci].prices[pi]!==undefined) ? customers[ci].prices[pi] : products[pi].price; }
function bp(pi) { return products[pi].buyPrice || 0; }
function icp(ci,pi) { return customers[ci].prices && customers[ci].prices[pi]!==undefined; }
function ct(ci) { return products.reduce((s,p,pi)=>s+sp(ci,pi)*customers[ci].counts[pi],0); }
function cpr(ci) { return products.reduce((s,p,pi)=>s+(sp(ci,pi)-bp(pi))*customers[ci].counts[pi],0); }

// MODAL
function updPrev() {
  const sell=parseFloat(document.getElementById('ePrice').value)||0;
  const buy=parseFloat(document.getElementById('eBuy').value)||0;
  const el=document.getElementById('ePrev');
  if (sell>0&&buy>0) {
    el.style.display='block';
    const pr=sell-buy;
    el.textContent='Adet başı kâr: '+pr.toFixed(2)+' €';
    el.style.color=pr>=0?'var(--profit)':'var(--red)';
  } else el.style.display='none';
}
function openEdit(ci,pi) {
  eCi=ci; ePi=pi;
  document.getElementById('eTitle').textContent=pdn(products[pi]);
  document.getElementById('eSub').textContent=customers[ci].name+' için fiyat';
  document.getElementById('ePrice').value=sp(ci,pi);
  document.getElementById('eBuy').value=bp(pi)||'';
  document.getElementById('eReset').style.display=icp(ci,pi)?'block':'none';
  updPrev();
  document.getElementById('editMov').classList.add('open');
}
function closeEdit() { document.getElementById('editMov').classList.remove('open'); eCi=null; ePi=null; }
function saveEdit() {
  const sell=parseFloat(document.getElementById('ePrice').value);
  const buy=parseFloat(document.getElementById('eBuy').value);
  if (isNaN(sell)||sell<0) return;
  if (!customers[eCi].prices) customers[eCi].prices={};
  customers[eCi].prices[ePi]=sell;
  if (!isNaN(buy)&&buy>=0) products[ePi].buyPrice=buy;
  closeEdit(); save(); render();
}
function resetDef() {
  if (customers[eCi].prices) delete customers[eCi].prices[ePi];
  closeEdit(); save(); render();
}
document.getElementById('editMov').addEventListener('click',function(e){if(e.target===this)closeEdit();});

// NAV
function showTab(t) { activeTab=t; render(); }
function showCust(i) { activeTab=i; render(); }

// CUSTOMER
function addCustomer() {
  const n=prompt('Müşteri adı:');
  if (!n||!n.trim()) return;
  customers.unshift({name:n.trim(),counts:new Array(products.length).fill(0),prices:{},delivered:false});
  save(); activeTab=0; render();
}
function delCust(i) {
  if (!confirm(customers[i].name+' silinsin mi?')) return;
  customers.splice(i,1);
  activeTab=customers.length>0?0:'total';
  save(); render();
}
function togDel(ci) { customers[ci].delivered=!customers[ci].delivered; save(); render(); }
function movCust(f,t) {
  if (t<0||t>=customers.length) return;
  const [m]=customers.splice(f,1); customers.splice(t,0,m);
  activeTab=t; save(); render();
}

// PRODUCTS
function chg(ci,pi,d) { customers[ci].counts[pi]=Math.max(0,customers[ci].counts[pi]+d); save(); render(); }
function delProd(pi) {
  if (!confirm(pdn(products[pi])+' silinsin mi?')) return;
  products.splice(pi,1);
  customers.forEach(c=>{c.counts.splice(pi,1);if(c.prices)delete c.prices[pi];});
  alArr.splice(pi,1);
  save(); render();
}
function addProd() {
  const n=document.getElementById('an').value.trim();
  const sz=document.getElementById('asz').value.trim();
  const p=parseFloat(document.getElementById('ap').value);
  const b=parseFloat(document.getElementById('ab').value)||0;
  const err=document.getElementById('aerr');
  if (!n){err.textContent='Ürün adı boş olamaz!';return;}
  if (isNaN(p)||p<0){err.textContent='Geçerli fiyat gir!';return;}
  err.textContent='';
  products.push({name:n,size:sz,price:p,buyPrice:b});
  customers.forEach(c=>c.counts.push(0));
  alArr.push(0);
  document.getElementById('an').value='';
  document.getElementById('asz').value='';
  document.getElementById('ap').value='';
  document.getElementById('ab').value='';
  save(); render();
}
function movProd(f,t) {
  if (t<0||t>=products.length) return;
  const [mp]=products.splice(f,1); products.splice(t,0,mp);
  customers.forEach(c=>{
    const [mc]=c.counts.splice(f,1); c.counts.splice(t,0,mc);
    if (c.prices){
      const np={};
      Object.keys(c.prices).forEach(k=>{
        const idx=parseInt(k);
        if(idx===f)np[t]=c.prices[k];
        else if(idx===t)np[f]=c.prices[k];
        else np[idx]=c.prices[k];
      });
      c.prices=np;
    }
  });
  const [ma]=alArr.splice(f,1); alArr.splice(t,0,ma);
  save(); render();
}
function resetAll() {
  if (!confirm('Tüm siparişler sıfırlansın mı?')) return;
  customers.forEach(c=>{c.counts.fill(0);c.delivered=false;});
  save(); render();
}

// FİYAT KOPYALA
function copyPrice() {
  let text = '🥤 FİYAT LİSTESİ\n\n';
  products.forEach(p => { text += '▪ ' + pdn(p) + ' — ' + p.price + ' €\n'; });
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    const el=document.getElementById('cSuccess');
    el.style.display='block';
    setTimeout(()=>el.style.display='none',3000);
  } catch(e) { alert('Kopyalanamadı!'); }
  document.body.removeChild(ta);
}

// ALINACAKLAR
function chgAl(pi,d) { alArr[pi]=Math.max(0,(alArr[pi]||0)+d); save(); renderEksik(); }
function clearAl() { if(!confirm('Sıfırlansın mı?'))return; alArr.fill(0); save(); renderEksik(); }

// NOTLAR
function addNot() {
  const v=document.getElementById('notInp').value.trim();
  if (!v) return;
  notlar.push({text:v});
  document.getElementById('notInp').value='';
  save(); renderEksik();
}
function delNot(i) { notlar.splice(i,1); save(); renderEksik(); }
document.getElementById('notInp').addEventListener('keydown',e=>{if(e.key==='Enter')addNot();});

function renderEksik() {
  // Alınacaklar ürün listesi
  document.getElementById('alProductList').innerHTML = products.map((p,pi)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <span style="font-size:0.9rem;font-weight:600;">${p.name}</span>
        ${p.size?`<span style="font-size:0.7rem;color:var(--blue);margin-left:4px;">${p.size}</span>`:''}
      </div>
      <button onclick="chgAl(${pi},-1)" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--red);background:transparent;color:var(--red);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">−</button>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;min-width:24px;text-align:center;color:${(alArr[pi]||0)>0?'var(--orange)':'var(--muted)'};">${alArr[pi]||0}</span>
      <button onclick="chgAl(${pi},1)" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--orange);background:transparent;color:var(--orange);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">+</button>
    </div>
  `).join('');

  // Özet
  const sel = products.filter((_,pi)=>(alArr[pi]||0)>0);
  const alSum = document.getElementById('alSummary');
  if (sel.length===0) {
    alSum.innerHTML='<p class="empty">Henüz seçilmedi.</p>';
  } else {
    alSum.innerHTML = sel.map(p=>{
      const pi=products.indexOf(p);
      return `<div class="eitem"><span>🛒</span><span style="flex:1;font-size:0.9rem;">${pdn(p)} — <strong>${alArr[pi]} adet</strong></span></div>`;
    }).join('');
  }

  // Notlar
  const nl=document.getElementById('notList');
  if (notlar.length===0) {
    nl.innerHTML='<p class="empty">Not yok.</p>';
  } else {
    nl.innerHTML=notlar.map((item,i)=>`
      <div class="nitem">
        <div class="ndot"></div>
        <span class="ntxt">${item.text}</span>
        <button class="idel" onclick="delNot(${i})">✕</button>
      </div>
    `).join('');
  }
}

function render() {
  // TABS
  const tb=document.getElementById('tabBar');
  const nc=tb.querySelector('.btn-nc');
  const tt=document.getElementById('tTotal');
  const tp=document.getElementById('tPrice');
  const te=document.getElementById('tEksik');
  tb.innerHTML=''; tb.appendChild(nc);
  customers.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(activeTab===i?' active':'')+(c.delivered?' delivered':'');
    const tot=ct(i);
    btn.innerHTML=(c.delivered?'✅ ':'')+c.name+(tot>0&&!c.delivered?`<span class="bdg">${tot}€</span>`:'');
    btn.onclick=()=>showCust(i);
    tb.appendChild(btn);
  });
  tt.className='tab'+(activeTab==='total'?' active':'');
  tp.className='tab'+(activeTab==='price'?' active':'');
  te.className='tab'+(activeTab==='eksik'?' active':'');
  tb.appendChild(tt); tb.appendChild(tp); tb.appendChild(te);

  // VIEWS
  document.getElementById('vTotal').className='view'+(activeTab==='total'?' active':'');
  document.getElementById('vPrice').className='view'+(activeTab==='price'?' active':'');
  document.getElementById('vEksik').className='view'+(activeTab==='eksik'?' active':'');

  // CUSTOMER
  const cc=document.getElementById('custCont');
  cc.innerHTML='';
  customers.forEach((c,ci)=>{
    if (activeTab!==ci) return;
    const div=document.createElement('div');
    div.className='view active';
    const ts=ct(ci), tp2=cpr(ci);
    div.innerHTML=`
      <div class="ch">
        <div class="chl">
          <span class="cname">${c.name}</span>
          <div class="mcbtns">
            <button class="mcbtn" onclick="movCust(${ci},${ci-1})" ${ci===0?'disabled':''}>◀</button>
            <button class="mcbtn" onclick="movCust(${ci},${ci+1})" ${ci===customers.length-1?'disabled':''}>▶</button>
          </div>
        </div>
        <button class="btn-dc" onclick="delCust(${ci})">Sil</button>
      </div>
      <div class="dbar">
        <button class="btn-del ${c.delivered?'done':''}" onclick="togDel(${ci})">
          ${c.delivered?'✅ TESLİM EDİLDİ — Geri Al':'⏳ TESLİM ET'}
        </button>
      </div>
      <div class="prods">
        ${products.map((p,pi)=>{
          const sell=sp(ci,pi), buy=bp(pi), prof=sell-buy, cust=icp(ci,pi);
          return `<div class="prow ${c.counts[pi]>0?'active':''} ${c.delivered?'dimmed':''}">
            <div class="mbtns">
              <button class="mbtn" onclick="movProd(${pi},${pi-1})" ${pi===0?'disabled':''}>▲</button>
              <button class="mbtn" onclick="movProd(${pi},${pi+1})" ${pi===products.length-1?'disabled':''}>▼</button>
            </div>
            <div class="pinfo">
              <div class="pnrow">
                <span class="pname">${p.name}</span>
              </div>
              <div class="pmeta">
                <span class="ptag psell ${cust?'custom':''}">Satış: ${sell}€${cust?' ✦':''}</span>
                ${buy>0?`<span class="ptag pbuy">Alış: ${buy}€</span>`:''}
                ${buy>0?`<span class="ptag pprofit">+${prof.toFixed(0)}€</span>`:''}
              </div>
            </div>
            <div class="ctr">
              <button class="cbtn minus" onclick="chg(${ci},${pi},-1)">−</button>
              <span class="cval">${c.counts[pi]}</span>
              <button class="cbtn plus" onclick="chg(${ci},${pi},1)">+</button>
            </div>
            <button class="ebtn" onclick="openEdit(${ci},${pi})">✏️</button>
            <button class="dbtn" onclick="delProd(${pi})">✕</button>
          </div>`;
        }).join('')}
      </div>
      <div class="apanel">
        <div class="aptitle">+ YENİ ÜRÜN EKLE</div>
        <div class="afields">
          <input type="text" id="an" placeholder="Ürün adı" />
          <input type="text" id="asz" placeholder="Hacim (330ml)" />
          <input type="number" id="ap" placeholder="Satış €" min="0" />
          <input type="number" id="ab" placeholder="Alış €" min="0" />
          <button class="aadd" onclick="addProd()">EKLE</button>
        </div>
        <div class="errmsg" id="aerr"></div>
      </div>
      <div class="summ">
        <div class="summt">SİPARİŞ ÖZETİ — ${c.name}</div>
        ${products.some((_,pi)=>c.counts[pi]>0)
          ? products.map((p,pi)=>c.counts[pi]>0?`<div class="sitem"><span>${pdn(p)} × ${c.counts[pi]}</span><span>${sp(ci,pi)*c.counts[pi]} €</span></div>`:'').join('')
          : '<p class="empty">Henüz ürün seçilmedi.</p>'
        }
        <div class="trow"><span class="tlbl">CİRO</span><span class="tamt">${ts} €</span></div>
        <div class="prow2"><span class="plbl">💰 KÂR</span><span class="pamt">${tp2.toFixed(0)} €</span></div>
      </div>
      <button class="breset" onclick="customers[${ci}].counts.fill(0);customers[${ci}].delivered=false;save();render();">🗑 Bu Siparişi Sıfırla</button>
    `;
    cc.appendChild(div);
  });

  // FİYAT
  if (activeTab==='price') {
    document.getElementById('plItems').innerHTML=products.map(p=>`
      <div class="plitem" style="padding:7px 0;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="plname">${p.name}</span>
          ${p.size?`<span class="plsize" style="font-size:0.7rem;color:var(--blue);background:#0a1a2a;border:1px solid #1a3a5a;padding:1px 5px;border-radius:5px;">${p.size}</span>`:''}
        </div>
        <span class="plprice">${p.price > 0 ? p.price + ' €' : '—'}</span>
      </div>
    `).join('');
  }

  // EKSİKLER
  if (activeTab==='eksik') renderEksik();

  // TOPLAM
  if (activeTab==='total') {
    const wait=customers.filter(c=>!c.delivered&&ct(customers.indexOf(c))>0);
    const done=customers.filter(c=>c.delivered);
    const gws=document.getElementById('gwSec'), gds=document.getElementById('gdSec');
    if (wait.length>0) {
      gws.style.display='block';
      document.getElementById('gwItems').innerHTML=wait.map(c=>{
        const ci=customers.indexOf(c);
        return `<div class="gci"><span>${c.name}</span><span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px"><span style="color:var(--accent);font-weight:600">${ct(ci)} €</span><span class="gp">💰 ${cpr(ci).toFixed(0)} €</span></span></div>`;
      }).join('');
    } else gws.style.display='none';
    if (done.length>0) {
      gds.style.display='block';
      document.getElementById('gdItems').innerHTML=done.map(c=>{
        const ci=customers.indexOf(c);
        return `<div class="gci"><span>✅ ${c.name}</span><span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px"><span style="color:var(--green);font-weight:600">${ct(ci)} €</span><span class="gp">💰 ${cpr(ci).toFixed(0)} €</span></span></div>`;
      }).join('');
    } else gds.style.display='none';
    const pt=products.map((p,pi)=>({name:pdn(p),price:p.price,buyPrice:p.buyPrice||0,cnt:customers.reduce((s,c)=>s+c.counts[pi],0)})).filter(x=>x.cnt>0);
    const psl=document.getElementById('prodSlbl'), gpi=document.getElementById('prodItems');
    if (pt.length>0) {
      psl.style.display='block';
      gpi.innerHTML=pt.map(x=>{
        const pr=(x.price-x.buyPrice)*x.cnt;
        return `<div class="pti"><div class="ptil"><span class="ptin">${x.name}</span><span class="ptis">${x.price}€${x.buyPrice>0?' · '+x.buyPrice+'€ alış':''}</span></div><div class="ptir"><span class="abadge">${x.cnt} ADET</span><span class="ttext">${(x.price*x.cnt).toFixed(0)} €</span>${x.buyPrice>0?`<span class="prtext">💰 ${pr.toFixed(0)} €</span>`:''}</div></div>`;
      }).join('');
    } else { psl.style.display='none'; gpi.innerHTML=''; }
    document.getElementById('gTotal').textContent=customers.reduce((s,_,ci)=>s+ct(ci),0).toFixed(0)+' €';
    document.getElementById('gProfit').textContent=customers.reduce((s,_,ci)=>s+cpr(ci),0).toFixed(0)+' €';
  }
}

render();
</script>
</body>
</html>
